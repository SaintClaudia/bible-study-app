name: Update Sunday Readings

on:
  schedule:
    # 5:00 pm CDT (UTC-5, Mar–Nov): 22:00 UTC
    - cron: '0 22 * * 0'
    # 5:00 pm CST (UTC-6, Nov–Mar): 23:00 UTC
    - cron: '0 23 * * 0'
  workflow_dispatch:
    inputs:
      date:
        description: 'Override date (YYYY-MM-DD). Defaults to this Sunday.'
        required: false
        type: string

jobs:
  update:
    name: Fetch & update readings
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install script dependencies
        run: |
          npm install --no-save \
            playwright \
            catholic-mass-readings \
            @anthropic-ai/sdk

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OVERRIDE_DATE: ${{ inputs.date }}
        run: node .github/scripts/update-readings.mjs

      - name: Commit updated readings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/readings-data.json
          if git diff --staged --quiet; then
            echo "No changes to readings — skipping commit"
          else
            git commit -m "chore: update Sunday readings [skip ci]"
            git push
          fi
