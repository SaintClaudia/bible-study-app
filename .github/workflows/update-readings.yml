name: Update Sunday Readings

on:
  schedule:
    # 5:00 pm CDT (summer) / 4:00 pm CST (winter)
    - cron: '0 22 * * 0'
  workflow_dispatch:
    inputs:
      date:
        description: 'Override date (YYYY-MM-DD). Defaults to this Sunday.'
        required: false
        type: string

permissions: {}

jobs:
  update:
    name: Fetch & update readings
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install script dependencies
        run: |
          npm install --no-save \
            playwright \
            catholic-mass-readings \
            @anthropic-ai/sdk

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OVERRIDE_DATE: ${{ inputs.date }}
        run: node .github/scripts/update-readings.mjs

      - name: Validate readings JSON
        run: |
          node -e "
            const data = JSON.parse(require('fs').readFileSync('lib/readings-data.json', 'utf8'));
            const s = data.sunday;
            if (!s?.date || !s?.liturgicalDay || !s?.season || !s?.theme || !s?.themeNote) {
              throw new Error('Missing required top-level fields in readings-data.json');
            }
            if (!Array.isArray(s.readings) || s.readings.length < 4) {
              throw new Error('Expected at least 4 readings, got: ' + (s.readings?.length ?? 0));
            }
            s.readings.forEach((r, i) => {
              if (!r.label || !r.reference || !r.fullText || !r.summary) {
                throw new Error('Reading ' + i + ' is missing required fields');
              }
            });
            console.log('Schema OK — ' + s.readings.length + ' readings for ' + s.date);
          "

      - name: Commit updated readings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/readings-data.json
          if git diff --staged --quiet; then
            echo "No changes to readings — skipping commit"
          else
            git commit -m "chore: update Sunday readings [skip ci]"
            git push
          fi
